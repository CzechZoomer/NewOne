<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orthodox Liturgy Study Guide</title>
    <meta name="description" content="Study guide for Orthodox Liturgies for Priests and Deacons (Russian Typikon).">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Landing View -->
        <main id="landing-view" class="view active">
            <div class="landing-content">
                <header class="text-center mb-12">
                    <h1 class="logo-title">Orthodox Liturgy Guide</h1>
                    <p class="subtitle">According to the Russian Typikon</p>
                </header>
                
                <div class="role-selector">
                    <button class="role-card" data-role="priest">
                        <div class="role-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <h2>Priest</h2>
                        <p>Study guides for serving</p>
                    </button>
                    
                    <button class="role-card" data-role="deacon">
                        <div class="role-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M8 8h8M8 16h8"/></svg>
                        </div>
                        <h2>Deacon</h2>
                        <p>Study guides for serving</p>
                    </button>
                </div>
            </div>
        </main>

        <!-- Main Dashboard View -->
        <main id="dashboard-view" class="view">
            <nav class="sidebar">
                <div class="sidebar-header">
                    <button id="back-button" class="icon-btn" title="Back to roles">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    </button>
                    <h2 id="current-role-title">Role</h2>
                </div>
                
                <ul class="nav-links">
                    <li><button class="nav-btn active" data-service="divineLiturgy">Divine Liturgy</button></li>
                    <li><button class="nav-btn" data-service="hierarchical">Hierarchical Divine Liturgy</button></li>
                    <li><button class="nav-btn" data-service="vespers">Vespers (Great & Daily)</button></li>
                    <li><button class="nav-btn" data-service="robloxManners">Roblox Context & Manners</button></li>
                </ul>
            </nav>
            
            <section class="content-area">
                <div class="content-header">
                    <h1 id="service-title">Service Name</h1>
                </div>
                <div id="service-content" class="content-body">
                    <!-- Content injected here via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/content.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
